<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Food Garden</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* --- ОСНОВА --- */
body{
margin:0;
padding:20px;
font-family: system-ui, -apple-system, sans-serif;
background: radial-gradient(circle at top, #4b2e2e, #2b1a1a);
color:#f5f5f5;
}

/* --- ЗАГОЛОВОК --- */
h2{
margin-top:0;
}

/* --- КАРТОЧКИ --- */
.card{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(12px);
border-radius:16px;
padding:15px;
margin:12px 0;
box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

/* --- СТЕКЛО-КНОПКИ --- */
.glass-btn{
background: rgba(46, 204, 113, 0.2);
backdrop-filter: blur(10px);
border:1px solid rgba(46,204,113,0.4);
border-radius:14px;
padding:12px;
margin-top:10px;
text-align:center;
color:#d4ffd9;
font-weight:500;
transition:0.2s;
cursor:pointer;
}

.glass-btn:active{
transform:scale(0.97);
}

.glass-btn.active{
background: rgba(46,204,113,0.6);
color:white;
box-shadow: 0 0 12px rgba(46,204,113,0.5);
}

/* --- СПИСКИ --- */
ul{
padding-left:18px;
margin:10px 0;
}

/* --- КОРЗИНА --- */
.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background: rgba(0,0,0,0.6);
backdrop-filter: blur(12px);
padding:15px;
border-top:1px solid rgba(255,255,255,0.1);
}

/* чтобы контент не перекрывался корзиной */
#menu{
padding-bottom:100px;
}

</style>

</head>

<body>

<div id="menu"></div>
<div id="cart"></div>

<!-- ПОДКЛЮЧЕНИЕ JS -->
<script src="app.js"></script>

</body>
</html>
