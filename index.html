<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Food Garden</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
font-family:sans-serif;
margin:0;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.option{
background:#f0f0f0;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:10px;
font-size:16px;
background:#2ecc71;
color:white;
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:15px;
border-top:1px solid #ddd;
}
</style>

</head>

<body>

<div id="menu"></div>
<div id="cart"></div>

<script>

const tg = window.Telegram.WebApp
tg.ready()

// 🔥 ВАЖНО
const menu = document.getElementById("menu")
const cartDiv = document.getElementById("cart")

let cart = []
let currentMenu = null
let currentType = null

const breadOptions = [
"Пшеничный с орегано",
"Пшеничный с грецкими орехами и семенами чиа и льна",
"Пшеничный с зирой"
]

const pieOptions = [
"С капустой",
"С картошкой",
"С яйцом, луком и рисом"
]

const menus = {

russian: [
{
day:"Понедельник",
fixed:["Салат «Летний»","Гречка с грибами и луком","Солёные огурцы"],
soups:["Борщ + Гороховый суп","Куриный суп с сухариками + Рассольник"],
mains:[
"Говядина тушёная с картофельным пюре + Куриная печень с рисом",
"Котлета из говядины с гречкой + Котлета куриная с запечёнными овощами"
]
}
],

international: [
{
day:"Понедельник",
fixed:["Греческий салат","Бутерброд с сыром","Солёные огурцы"],
soups:["Шурпа + Крем-суп грибной","Харчо + Овощной суп-пюре"],
mains:["Гуляш + Курица терияки","Курица Кун Пао + Ломо сальтадо"]
}
]

}

// --- ВЫБОР МЕНЮ ---
function renderMenuTypes(){

menu.innerHTML = `
<div class="card">
<h2>Выберите меню</h2>

<button onclick="openMenu('russian')">Русское меню</button>
<button onclick="openMenu('international')">Интернациональное меню</button>

</div>
`

}

// --- ДНИ ---
function openMenu(type){

currentType = type
currentMenu = menus[type]

menu.innerHTML = ""

currentMenu.forEach((set,i)=>{

menu.innerHTML += `
<div class="card">
<h2>${set.day}</h2>
<button onclick="openDay(${i})">Открыть</button>
</div>
`

})

// 🔥 КНОПКА НАЗАД
menu.innerHTML += `
<button onclick="renderMenuTypes()">← Назад</button>
`

}

// --- ДЕНЬ ---
function openDay(index){

const set = currentMenu[index]

menu.innerHTML = `

<div class="card">

<h2>${set.day}</h2>

<h3>ФИКС</h3>
<ul>${set.fixed.map(i=>`<li>${i}</li>`).join("")}</ul>

<h3>Пара супов на выбор</h3>
${set.soups.map((s,i)=>`
<div class="option">
<label><input type="radio" name="soup" value="${s}" ${i===0?"checked":""}> ${s}</label>
</div>
`).join("")}

<h3>Вторые блюда на выбор</h3>
${set.mains.map((m,i)=>`
<div class="option">
<label><input type="radio" name="main" value="${m}" ${i===0?"checked":""}> ${m}</label>
</div>
`).join("")}

<h3>Хлеб:</h3>
${breadOptions.map(b=>`
<div class="option">
<label><input type="checkbox" name="bread" value="${b}"> ${b}</label>
</div>
`).join("")}

<h3>Пирожки:</h3>
${pieOptions.map(p=>`
<div class="option">
<label><input type="checkbox" name="pies" value="${p}"> ${p}</label>
</div>
`).join("")}

<textarea id="comment" placeholder="Комментарий" style="width:100%;margin-top:10px;padding:10px;border-radius:8px;"></textarea>

<button onclick="addToCart('${set.day}')">Добавить в корзину</button>
<button onclick="openMenu(currentType)">← Назад</button>

</div>
`

}

// --- ДОБАВИТЬ ---
function addToCart(day){

const soup = document.querySelector('input[name="soup"]:checked')?.value
const main = document.querySelector('input[name="main"]:checked')?.value

if(!soup || !main){
alert("Выберите суп и второе блюдо")
return
}

cart.push({day,soup,main})

renderCart()
alert("Добавлено")

}

// --- КОРЗИНА ---
function renderCart(){

if(cart.length === 0){
cartDiv.innerHTML = ""
return
}

cartDiv.innerHTML = `
<div class="cart">
<b>Корзина: ${cart.length}</b>
<button onclick="checkout()">Оформить заказ</button>
</div>
`

}

// --- ОФОРМЛЕНИЕ ---
function checkout(){

tg.sendData(JSON.stringify({cart}))

setTimeout(()=>{
tg.close()
},500)

}

// --- СТАРТ ---
renderMenuTypes()

</script>

</body>
</html>
