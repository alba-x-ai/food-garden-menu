<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Food Garden</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family: sans-serif;
margin:0;
padding:20px;
background:#f5f5f5;
}

h1{
text-align:center;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
font-size:16px;
background:#2ecc71;
color:white;
}

button.secondary{
background:#3498db;
}

button.gray{
background:#aaa;
}

.option{
border:1px solid #ddd;
border-radius:8px;
padding:10px;
margin-top:10px;
cursor:pointer;
}

.option.selected{
border:2px solid #2ecc71;
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #ddd;
padding:15px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<h1>Food Garden</h1>

<div id="app">

<!-- экран выбора меню -->

<div id="menuType" class="card">

<h2>Выберите меню</h2>

<button onclick="selectMenu('russian')">
🇷🇺 Русское меню
</button>

<button onclick="selectMenu('international')">
🌍 Интернациональное меню
</button>

</div>


<!-- экран выбора дня -->

<div id="daySelect" class="card hidden">

<h2>Выберите день</h2>

<button onclick="selectDay('Понедельник')">
Понедельник
</button>

<button onclick="selectDay('Среда')">
Среда
</button>

<button onclick="selectDay('Пятница')">
Пятница
</button>

<button class="gray" onclick="backToMenu()">
← Назад
</button>

</div>


<!-- экран выбора блюд -->

<div id="mealSelect" class="card hidden">

<h2 id="mealTitle"></h2>

<h3>Фикс</h3>
<div id="fix"></div>

<h3>Суп (выберите)</h3>
<div id="soups"></div>

<h3>Второе (выберите)</h3>
<div id="mains"></div>

<h3>Дополнительно</h3>

<div class="option" onclick="toggleBread(this)">
Хлеб
</div>

<div class="option" onclick="togglePies(this)">
Пирожки
</div>

<textarea id="comment" placeholder="Комментарий к заказу"></textarea>

<button onclick="addToCart()">
Добавить в корзину
</button>

<button class="gray" onclick="backToDays()">
← Назад
</button>

</div>


</div>


<!-- корзина -->

<div id="cart" class="cart hidden">

<div id="cartItems"></div>

<button onclick="checkout()">
Оформить заказ
</button>

</div>


<script>

const tg = window.Telegram.WebApp
tg.ready()

</script>

</body>
</html>
