<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Food Garden</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:sans-serif;
margin:0;
padding:20px;
background:#f5f5f5;
}

.setCard{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
font-size:16px;
background:#2ecc71;
color:white;
}

button:disabled{
background:#ccc;
}

.setFull{
background:white;
padding:20px;
border-radius:10px;
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:15px;
border-top:1px solid #ddd;
}

</style>

</head>

<body>

<div id="menu"></div>

<div id="cart"></div>

<script>

const tg = window.Telegram.WebApp
tg.ready()

const API = "https://food-garden-menu.onrender.com/spots"

const LIMIT = 15

let cart = []

const sets = [

{
day:"Понедельник",
price:895000,
spots:null,
menu:[
"Хлеб пшеничный с зирой",
"Салат «Витаминный»",
"Каша гречневая с грибами и луком",
"Борщ",
"Гороховый суп",
"Говядина тушёная",
"Куриная печень",
"Солёные огурцы"
]
},

{
day:"Среда",
price:925000,
spots:null,
menu:[
"Хлеб с орегано",
"Салат «Летний»",
"Перловка с грибами",
"Солянка",
"Щи",
"Котлета свинина/говядина",
"Куриная котлета",
"Квашеная капуста"
]
},

{
day:"Пятница",
price:967000,
spots:null,
menu:[
"Хлеб с орехами",
"Свекольный салат",
"Гороховая каша",
"Куриный суп",
"Рассольник",
"Курица с лапшой",
"Свиные рёбра",
"Маринованные помидоры"
]
}

]

const container = document.getElementById("menu")

async function loadSpots(){

try{

const res = await fetch(API)
const data = await res.json()

sets.forEach(set=>{
set.spots = data[set.day]
})

}catch(e){

sets.forEach(set=>{
set.spots = LIMIT
})

}

}

function renderSets(){

container.innerHTML=""

sets.forEach((set,i)=>{

const soldOut = set.spots===0

const card=document.createElement("div")
card.className="setCard"

card.innerHTML=`

<h2>${set.day}</h2>

<div>${set.price.toLocaleString()} ₫</div>

<div>
${soldOut ? "Sold Out" : "Осталось мест: "+set.spots+" / "+LIMIT}
</div>

<button ${soldOut?"disabled":""} onclick="openSet(${i})">
${soldOut?"Недоступно":"Посмотреть меню"}
</button>

`

container.appendChild(card)

})

renderCart()

}

function openSet(index){

const set=sets[index]

const menuItems=set.menu.map(i=>`<li>${i}</li>`).join("")

container.innerHTML=`

<div class="setFull">

<h2>${set.day}</h2>

<ul>${menuItems}</ul>

<div>${set.price.toLocaleString()} ₫</div>

<textarea id="comment" placeholder="Комментарий"></textarea>

<button onclick="addToCart('${set.day}')">
Добавить в корзину
</button>

<button onclick="renderSets()">
← Назад
</button>

</div>

`

}

function addToCart(day){

const set=sets.find(s=>s.day===day)

const existing=cart.find(c=>c.day===day)

if(existing){

existing.qty++

}else{

cart.push({
day:set.day,
price:set.price,
qty:1
})

}

alert("Добавлено в корзину")

renderCart()

}

function renderCart(){

const cartDiv=document.getElementById("cart")

if(cart.length===0){

cartDiv.innerHTML=""
return

}

let total=0

cart.forEach(item=>{
total+=item.price*item.qty
})

cartDiv.innerHTML=`

<div class="cart">

<b>Корзина</b><br>

${cart.map(i=>`${i.day} × ${i.qty}`).join("<br>")}

<br><br>

<b>${total.toLocaleString()} ₫</b>

<button onclick="checkout()">
Оформить заказ
</button>

</div>

`

}

function checkout(){

const comment=document.getElementById("comment")?.value || ""

const order={
cart:cart,
comment:comment
}

tg.sendData(JSON.stringify(order))

tg.close()

}

async function init(){

await loadSpots()

renderSets()

}

init()

</script>

</body>

</html>
