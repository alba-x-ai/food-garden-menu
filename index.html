<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Food Garden</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:sans-serif;
margin:0;
padding:20px;
background:#f2f2f2;
}

h1{
text-align:center;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:10px;
font-size:16px;
background:#2ecc71;
color:white;
}

.gray{
background:#aaa;
}

.option{
border:1px solid #ddd;
padding:10px;
border-radius:8px;
margin-top:8px;
cursor:pointer;
}

.option.selected{
border:2px solid #2ecc71;
}

.hidden{
display:none;
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #ddd;
padding:15px;
}

</style>

</head>

<body>

<h1>Food Garden</h1>

<div id="menuType" class="card">

<h2>Выберите меню</h2>

<button onclick="selectMenu('russian')">🇷🇺 Русское меню</button>
<button onclick="selectMenu('international')">🌍 Интернациональное меню</button>

</div>


<div id="daySelect" class="card hidden">

<h2>Выберите день</h2>

<button onclick="selectDay('Понедельник')">Понедельник</button>
<button onclick="selectDay('Среда')">Среда</button>
<button onclick="selectDay('Пятница')">Пятница</button>

<button class="gray" onclick="backToMenu()">← Назад</button>

</div>


<div id="mealSelect" class="card hidden">

<h2 id="mealTitle"></h2>

<h3>Фикс</h3>
<div id="fix"></div>

<h3>Суп</h3>
<div id="soups"></div>

<h3>Второе</h3>
<div id="mains"></div>

<!-- 🔥 ВАЖНО: НОВЫЕ БЛОКИ -->

<h3>Хлеб</h3>
<div id="breadOptions"></div>

<h3>Пирожки</h3>
<div id="piesOptions"></div>

<textarea id="comment" placeholder="Комментарий"></textarea>

<button onclick="addToCart()">Добавить в корзину</button>

<button class="gray" onclick="backToDays()">← Назад</button>

</div>


<div id="cart" class="cart hidden">

<div id="cartItems"></div>

<button onclick="checkout()">Оформить заказ</button>

</div>


<script>

const tg = window.Telegram.WebApp
tg.ready()

let selectedMenu=null
let selectedDay=null
let selectedSoup=null
let selectedMain=null

let selectedBread=null
let selectedPies=null

let cart=[]


const breads=[
"Пшеничный с орегано",
"Пшеничный с орехами и семенами",
"Пшеничный с зирой"
]

const piesOptions=[
"С капустой",
"С картошкой",
"С яйцом, луком и рисом"
]


const menus={

russian:{
Понедельник:{
fix:["Салат «Летний»","Гречка","Огурцы"],
soups:["Борщ","Куриный суп"],
mains:["Говядина + пюре","Котлета + гречка"]
},
Среда:{
fix:["Свекольный салат","Перловка","Капуста"],
soups:["Куриный суп","Солянка"],
mains:["Котлета","Курица"]
},
Пятница:{
fix:["Салат","Гороховая каша","Помидоры"],
soups:["Борщ","Солянка"],
mains:["Говядина","Курица"]
}
},

international:{
Понедельник:{
fix:["Greek salad","Sandwich","Cucumbers"],
soups:["Shurpa","Kharcho"],
mains:["Goulash","Teriyaki chicken"]
},
Среда:{
fix:["Beet salad","Sandwich","Cabbage"],
soups:["Kharcho","Lohikeitto"],
mains:["Kung Pao","Meatballs"]
},
Пятница:{
fix:["Salad","Sandwich","Tomatoes"],
soups:["Shurpa","Lohikeitto"],
mains:["Goulash","Meatballs"]
}
}

}


function selectMenu(menu){
selectedMenu=menu
menuType.classList.add("hidden")
daySelect.classList.remove("hidden")
}

function backToMenu(){
daySelect.classList.add("hidden")
menuType.classList.remove("hidden")
}

function selectDay(day){
selectedDay=day
daySelect.classList.add("hidden")
mealSelect.classList.remove("hidden")
renderMeals()
}

function backToDays(){
mealSelect.classList.add("hidden")
daySelect.classList.remove("hidden")
}


function renderMeals(){

const data=menus[selectedMenu][selectedDay]

mealTitle.innerText=selectedDay

fix.innerHTML=data.fix.join("<br>")


soups.innerHTML=""
data.soups.forEach(s=>{
const el=document.createElement("div")
el.className="option"
el.innerText=s
el.onclick=()=>{
selectedSoup=s
document.querySelectorAll("#soups .option").forEach(o=>o.classList.remove("selected"))
el.classList.add("selected")
}
soups.appendChild(el)
})


mains.innerHTML=""
data.mains.forEach(m=>{
const el=document.createElement("div")
el.className="option"
el.innerText=m
el.onclick=()=>{
selectedMain=m
document.querySelectorAll("#mains .option").forEach(o=>o.classList.remove("selected"))
el.classList.add("selected")
}
mains.appendChild(el)
})


renderExtras()

}


function renderExtras(){

breadOptions.innerHTML=""
breads.forEach(b=>{
const el=document.createElement("div")
el.className="option"
el.innerText=b
el.onclick=()=>{
selectedBread=b
document.querySelectorAll("#breadOptions .option").forEach(o=>o.classList.remove("selected"))
el.classList.add("selected")
}
breadOptions.appendChild(el)
})


piesOptions.innerHTML=""
piesOptionsArr.forEach(p=>{
const el=document.createElement("div")
el.className="option"
el.innerText=p
el.onclick=()=>{
selectedPies=p
document.querySelectorAll("#piesOptions .option").forEach(o=>o.classList.remove("selected"))
el.classList.add("selected")
}
piesOptions.appendChild(el)
})

}


const piesOptionsArr = piesOptions


function addToCart(){

if(!selectedSoup||!selectedMain){
alert("Выберите суп и второе")
return
}

cart.push({
menu:selectedMenu,
day:selectedDay,
soup:selectedSoup,
main:selectedMain,
bread:selectedBread,
pies:selectedPies
})

renderCart()

}


function renderCart(){

cart.classList.remove("hidden")

cartItems.innerHTML=cart.map(i=>`
<div>
<b>${i.day}</b><br>
${i.soup}<br>
${i.main}<br>
${i.bread? "Хлеб: "+i.bread+"<br>":""}
${i.pies? "Пирожки: "+i.pies+"<br>":""}
</div>
`).join("<hr>")

}


function checkout(){

if(cart.length===0){
alert("Корзина пуста")
return
}

tg.sendData(JSON.stringify({cart:cart}))

setTimeout(()=>tg.close(),500)

}

</script>

</body>
</html>
