<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Food Garden</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
margin:0;
padding:20px;
font-family:sans-serif;
background: radial-gradient(circle at top, #4b2e2e, #2b1a1a);
color:#f5f5f5;
}

/* карточки */
.card{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(12px);
border-radius:16px;
padding:15px;
margin:10px 0;
box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

/* стеклянные кнопки */
.glass-btn{
background: rgba(46, 204, 113, 0.2);
backdrop-filter: blur(10px);
border:1px solid rgba(46,204,113,0.4);
border-radius:14px;
padding:12px;
margin-top:10px;
text-align:center;
color:#d4ffd9;
font-weight:500;
transition:0.2s;
}

.glass-btn:active{
transform:scale(0.97);
background: rgba(46,204,113,0.35);
}

.glass-btn.active{
background: rgba(46,204,113,0.6);
color:white;
box-shadow: 0 0 10px rgba(46,204,113,0.5);
}

/* корзина */
.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background: rgba(0,0,0,0.6);
backdrop-filter: blur(12px);
padding:15px;
border-top:1px solid rgba(255,255,255,0.1);
}

</style>

</head>

<body>

<div id="menu"></div>
<div id="cart"></div>

<script>

const tg = window.Telegram.WebApp
tg.ready()

const menuDiv = document.getElementById("menu")
const cartDiv = document.getElementById("cart")

let cart = []
let selection = {}
let currentMenu = null

// --- МЕНЮ ---
const menus = {
russian: [

{
day:"Понедельник",
price:120000,
soups:["Борщ","Гороховый"],
mains:["Говядина","Курица"]
},

{
day:"Среда",
price:130000,
soups:["Солянка","Щи"],
mains:["Котлета","Курица"]
},

{
day:"Пятница",
price:140000,
soups:["Борщ","Щи"],
mains:["Говядина","Курица"]
}

]
}

// --- ДОПЫ ---
const breadPrice = 10000
const piePrice = 15000

const breadOptions = ["Органо","Орехи","Зира"]
const pieOptions = ["Капуста","Картошка","Яйцо"]

// --- UI ---
function chip(text, active, onclick){
return `
<div class="glass-btn ${active ? 'active' : ''}" onclick="${onclick}">
${text}
</div>
`
}

// --- ЭКРАН 1 ---
function renderMenu(){

currentMenu = menus.russian

menuDiv.innerHTML = `<h2>Food Garden</h2>`

currentMenu.forEach((set,i)=>{
menuDiv.innerHTML += `
<div class="card">
<h3>${set.day}</h3>
<div>${set.price.toLocaleString()}₫</div>
<div class="glass-btn" onclick="openDay(${i})">Выбрать</div>
</div>
`
})

}

// --- ЭКРАН 2 ---
function openDay(index){

const set = currentMenu[index]
if(!selection[set.day]) selection[set.day]={bread:[],pies:[]}

const sel = selection[set.day]

menuDiv.innerHTML = `
<div class="glass-btn" onclick="renderMenu()">← Назад</div>

<h2>${set.day}</h2>
<div><b>${set.price.toLocaleString()}₫</b></div>

<h3>Суп</h3>
${set.soups.map(s=>chip(s, sel.soup===s, `selectSoup('${set.day}','${s}')`)).join("")}

<h3>Второе</h3>
${set.mains.map(m=>chip(m, sel.main===m, `selectMain('${set.day}','${m}')`)).join("")}

<h3>Хлеб (+${breadPrice})</h3>
${breadOptions.map(b=>chip(b, sel.bread.includes(b), `toggleBread('${set.day}','${b}')`)).join("")}

<h3>Пирожки (+${piePrice})</h3>
${pieOptions.map(p=>chip(p, sel.pies.includes(p), `togglePies('${set.day}','${p}')`)).join("")}

<div class="glass-btn" onclick="addToCart(${index})">
Добавить (${calculatePrice(set, sel).toLocaleString()}₫)
</div>
`
}

// --- ЛОГИКА ---
function selectSoup(day,val){
selection[day].soup = val
rerender(day)
}

function selectMain(day,val){
selection[day].main = val
rerender(day)
}

function toggleBread(day,val){
const arr = selection[day].bread
selection[day].bread = arr.includes(val) ? arr.filter(i=>i!==val) : [...arr,val]
rerender(day)
}

function togglePies(day,val){
const arr = selection[day].pies
selection[day].pies = arr.includes(val) ? arr.filter(i=>i!==val) : [...arr,val]
rerender(day)
}

function rerender(day){
const i = currentMenu.findIndex(x=>x.day===day)
openDay(i)
}

// --- ЦЕНА ---
function calculatePrice(set, sel){

let total = set.price
total += (sel.bread?.length || 0) * breadPrice
total += (sel.pies?.length || 0) * piePrice

return total
}

// --- КОРЗИНА ---
function addToCart(index){

const set = currentMenu[index]
const sel = selection[set.day]

if(!sel.soup || !sel.main){
alert("Выберите суп и второе")
return
}

const price = calculatePrice(set, sel)

cart.push({
day:set.day,
...sel,
price
})

renderCart()
alert("Добавлено")
}

function renderCart(){

if(cart.length === 0){
cartDiv.innerHTML=""
return
}

const total = cart.reduce((s,i)=>s+i.price,0)

cartDiv.innerHTML = `
<div class="cart">
<b>Корзина (${cart.length})</b><br>
Итого: ${total.toLocaleString()}₫
<div class="glass-btn" onclick="checkout()">Оформить заказ</div>
</div>
`
}

// --- ОТПРАВКА ---
function checkout(){

tg.sendData(JSON.stringify({cart}))
tg.close()

}

// --- СТАРТ ---
renderMenu()

</script>

</body>
</html>
