<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Food Garden</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
font-family:sans-serif;
margin:0;
padding:16px;
background:#f5f5f5;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:white;
padding:16px;
border-radius:16px;
margin-bottom:16px;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.section-title{
font-weight:bold;
margin-top:20px;
margin-bottom:10px;
font-size:18px;
}

.sub{
color:#888;
font-size:13px;
margin-bottom:10px;
}

.option{
background:#fafafa;
border-radius:12px;
padding:14px;
margin-top:10px;
cursor:pointer;
border:2px solid transparent;
transition:0.2s;
}

.option:hover{
background:#f0f0f0;
}

.option.selected{
border:2px solid #2ecc71;
background:#eafaf1;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:15px;
font-size:16px;
background:#2ecc71;
color:white;
font-weight:bold;
}

.gray{
background:#ccc;
}

.hidden{
display:none;
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #ddd;
padding:15px;
}

</style>

</head>

<body>

<h1>Food Garden</h1>

<div id="menuType" class="card">
<div class="section-title">Выберите меню</div>

<div class="option" onclick="selectMenu('russian')">🇷🇺 Русское меню</div>
<div class="option" onclick="selectMenu('international')">🌍 Интернациональное меню</div>
</div>


<div id="daySelect" class="card hidden">
<div class="section-title">Выберите день</div>

<div class="option" onclick="selectDay('Понедельник')">Понедельник</div>
<div class="option" onclick="selectDay('Среда')">Среда</div>
<div class="option" onclick="selectDay('Пятница')">Пятница</div>

<button class="gray" onclick="backToMenu()">← Назад</button>
</div>


<div id="mealSelect" class="card hidden">

<div class="section-title" id="mealTitle"></div>

<div class="section-title">Входит в набор</div>
<div id="fix"></div>

<div class="section-title">Выберите суп</div>
<div class="sub">Обязательно выбрать один</div>
<div id="soups"></div>

<div class="section-title">Выберите второе</div>
<div class="sub">Обязательно выбрать один</div>
<div id="mains"></div>

<div class="section-title">➕ Дополнительно</div>

<div class="sub">Хлеб (по желанию)</div>
<div id="breadOptions"></div>

<div class="sub">Пирожки (по желанию)</div>
<div id="piesOptions"></div>

<textarea id="comment" placeholder="Комментарий" style="width:100%;margin-top:10px;"></textarea>

<button onclick="addToCart()">Добавить в корзину</button>
<button class="gray" onclick="backToDays()">← Назад</button>

</div>


<div id="cart" class="cart hidden">
<div id="cartItems"></div>
<button onclick="checkout()">Оформить заказ</button>
</div>


<script>

const tg = window.Telegram.WebApp
tg.ready()

let selectedMenu=null
let selectedDay=null
let selectedSoup=null
let selectedMain=null
let selectedBread=null
let selectedPies=null

let cart=[]


const breads=[
"🥖 С орегано",
"🌾 С орехами и семенами",
"🌿 С зирой"
]

const pies=[
"🥟 С капустой",
"🥟 С картошкой",
"🥟 С яйцом и рисом"
]


const menus={

international:{
Пятница:{
fix:["Salad","Sandwich","Tomatoes"],
soups:["🥣 Shurpa","🥣 Lohikeitto"],
mains:["🍖 Goulash","🍗 Meatballs"]
}
},

russian:{
Пятница:{
fix:["Салат","Гречка","Огурцы"],
soups:["🥣 Борщ","🥣 Куриный суп"],
mains:["🍖 Говядина","🍗 Курица"]
}
}

}



function selectMenu(menu){
selectedMenu=menu
menuType.classList.add("hidden")
daySelect.classList.remove("hidden")
}

function backToMenu(){
daySelect.classList.add("hidden")
menuType.classList.remove("hidden")
}

function selectDay(day){
selectedDay=day
daySelect.classList.add("hidden")
mealSelect.classList.remove("hidden")
renderMeals()
}

function backToDays(){
mealSelect.classList.add("hidden")
daySelect.classList.remove("hidden")
}


function renderMeals(){

const data=menus[selectedMenu][selectedDay]

mealTitle.innerText = selectedDay

fix.innerHTML=data.fix.join("<br>")

renderList("soups", data.soups, val=>{
selectedSoup=val
})

renderList("mains", data.mains, val=>{
selectedMain=val
})

renderList("breadOptions", breads, val=>{
selectedBread=val
})

renderList("piesOptions", pies, val=>{
selectedPies=val
})

}


function renderList(id, arr, onSelect){

const container=document.getElementById(id)
container.innerHTML=""

arr.forEach(item=>{

const el=document.createElement("div")
el.className="option"
el.innerText=item

el.onclick=()=>{
onSelect(item)
container.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"))
el.classList.add("selected")
}

container.appendChild(el)

})

}


function addToCart(){

if(!selectedSoup || !selectedMain){
alert("Выберите суп и второе")
return
}

cart.push({
day:selectedDay,
soup:selectedSoup,
main:selectedMain,
bread:selectedBread,
pies:selectedPies
})

renderCart()

}


function renderCart(){

cartDiv = document.getElementById("cart")
items = document.getElementById("cartItems")

cartDiv.classList.remove("hidden")

items.innerHTML = cart.map(i=>`
<div>
<b>${i.day}</b><br>
${i.soup}<br>
${i.main}<br>
${i.bread ? i.bread+"<br>" : ""}
${i.pies ? i.pies+"<br>" : ""}
</div>
`).join("<hr>")

}


function checkout(){

if(cart.length===0){
alert("Корзина пуста")
return
}

tg.sendData(JSON.stringify({cart:cart}))

setTimeout(()=>tg.close(),500)

}

</script>

</body>
</html>
