<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Garden</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

/* --- ФОН (ТЁМНЫЙ ИЗУМРУД) --- */
body{
margin:0;
padding:20px;
font-family: system-ui, -apple-system, sans-serif;

background: linear-gradient(180deg, #0f1f1a 0%, #08110e 100%);
color:#e8fff4;
}

/* --- ЗАГОЛОВКИ --- */
h2{
margin-top:0;
font-weight:600;
}

/* --- КАРТОЧКИ --- */
.card{
background: rgba(255,255,255,0.05);
backdrop-filter: blur(18px);
border-radius:18px;
padding:16px;
margin:14px 0;

box-shadow:
0 10px 40px rgba(0,0,0,0.7),
inset 0 0 0 1px rgba(255,255,255,0.06);
}

/* --- КНОПКИ --- */
.glass-btn{
background: rgba(46,204,113,0.18);
backdrop-filter: blur(14px);
border:1px solid rgba(46,204,113,0.35);
border-radius:16px;
padding:14px;
margin-top:10px;
text-align:center;
color:#d9ffe8;
font-weight:500;
cursor:pointer;
transition:0.2s;
}

.glass-btn:active{
transform:scale(0.96);
}

.glass-btn.active{
background: rgba(46,204,113,0.7);
color:white;
box-shadow:
0 0 15px rgba(46,204,113,0.7),
0 0 35px rgba(46,204,113,0.3);
}

/* --- СПИСКИ --- */
ul{
padding-left:18px;
line-height:1.5;
}

/* --- ОТСТУП СНИЗУ --- */
#menu{
padding-bottom:100px;
}

</style>

</head>

<body>

<div id="menu"></div>

<script src="app.js?v=10"></script>

</body>
</html>
