<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Food Garden</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{
font-family:sans-serif;
margin:0;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.option{
background:#f0f0f0;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-top:10px;
font-size:16px;
background:#2ecc71;
color:white;
}

.cart{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
padding:15px;
border-top:1px solid #ddd;
}
</style>

</head>

<body>

<div id="menu"></div>
<div id="cart"></div>

<script>

const tg = window.Telegram.WebApp
tg.ready()

let cart = []
let currentMenu = null
let currentType = null

// --- ОБЩЕЕ ---
const breadOptions = [
"Пшеничный с орегано",
"Пшеничный с грецкими орехами и семенами чиа и льна",
"Пшеничный с зирой"
]

const pieOptions = [
"С капустой",
"С картошкой",
"С яйцом, луком и рисом"
]

// --- ДВА МЕНЮ ---
const menus = {

russian: [

{
day:"Понедельник",
fixed:[
"Салат «Летний»",
"Гречка с грибами и луком",
"Солёные огурцы"
],
soups:[
"Борщ + Гороховый суп",
"Куриный суп с сухариками + Рассольник"
],
mains:[
"Говядина тушёная с картофельным пюре + Куриная печень с рисом",
"Котлета из говядины с гречкой + Котлета куриная с запечёнными овощами"
]
},

{
day:"Среда",
fixed:[
"Свекольный салат с орехом, чесноком, изюмом",
"Перловая каша с грибами и луком",
"Квашеная капуста"
],
soups:[
"Куриный суп с сухариками + Рассольник",
"Солянка + Щи"
],
mains:[
"Котлета из говядины с гречкой + Котлета куриная с запечёнными овощами",
"Курица запечённая с лапшой + Свиные рёбра с тушёной капустой"
]
},

{
day:"Пятница",
fixed:[
"Салат «Витаминный»",
"Гороховая каша с грибами и луком",
"Маринованные помидоры"
],
soups:[
"Борщ + Гороховый суп",
"Солянка + Щи"
],
mains:[
"Говядина тушёная с картофельным пюре + Куриная печень с рисом",
"Курица запечённая с лапшой + Свиные рёбра с тушёной капустой"
]
}

],

international: [

{
day:"Понедельник",
fixed:[
"Греческий салат",
"Бутерброд с сыром",
"Солёные огурцы"
],
soups:[
"Шурпа + Крем-суп грибной",
"Харчо + Овощной суп-пюре"
],
mains:[
"Гуляш с картофельным пюре + Курица терияки с запечёнными овощами",
"Курица Кун Пао с рисом + Ломо сальтадо"
]
},

{
day:"Среда",
fixed:[
"Свекольный салат",
"Бутерброд с сыром",
"Квашеная капуста"
],
soups:[
"Харчо + Овощной суп-пюре",
"Lohikeitto + Яично-помидорный"
],
mains:[
"Курица Кун Пао с рисом + Ломо сальтадо",
"Кёнигсбергские клопсы с картофелем + Индийское карри с рисом"
]
},

{
day:"Пятница",
fixed:[
"Салат с фунчозой",
"Бутерброд с сыром",
"Маринованные помидоры"
],
soups:[
"Шурпа + Крем-суп грибной",
"Lohikeitto + Яично-помидорный"
],
mains:[
"Гуляш с картофельным пюре + Курица терияки с запечёнными овощами",
"Кёнигсбергские клопсы с картофелем + Индийское карри с рисом"
]
}

]

}

// --- ВЫБОР МЕНЮ ---
function renderMenuTypes(){

menu.innerHTML = `
<div class="card">
<h2>Выберите меню</h2>

<button onclick="openMenu('russian')">Русское меню</button>
<button onclick="openMenu('international')">Интернациональное меню</button>

</div>
`

}

// --- ОТКРЫТЬ МЕНЮ ---
function openMenu(type){

currentType = type
currentMenu = menus[type]

menu.innerHTML = ""

currentMenu.forEach((set,i)=>{

menu.innerHTML += `
<div class="card">
<h2>${set.day}</h2>
<button onclick="openDay(${i})">Открыть</button>
</div>
`

})

}

// --- ДЕНЬ ---
function openDay(index){

const set = currentMenu[index]

menu.innerHTML = `

<div class="card">

<h2>${set.day}</h2>

<h3>ФИКС</h3>
<ul>${set.fixed.map(i=>`<li>${i}</li>`).join("")}</ul>

<h3>Пара супов на выбор</h3>
${set.soups.map((s,i)=>`
<div class="option">
<label><input type="radio" name="soup" value="${s}" ${i===0?"checked":""}> ${s}</label>
</div>
`).join("")}

<h3>Вторые блюда на выбор</h3>
${set.mains.map((m,i)=>`
<div class="option">
<label><input type="radio" name="main" value="${m}" ${i===0?"checked":""}> ${m}</label>
</div>
`).join("")}

<h3>Хлеб:</h3>
${breadOptions.map(b=>`
<div class="option">
<label><input type="checkbox" name="bread" value="${b}"> ${b}</label>
</div>
`).join("")}

<h3>Пирожки:</h3>
${pieOptions.map(p=>`
<div class="option">
<label><input type="checkbox" name="pies" value="${p}"> ${p}</label>
</div>
`).join("")}

<textarea id="comment" placeholder="Комментарий" style="width:100%;margin-top:10px;padding:10px;border-radius:8px;"></textarea>

<button onclick="addToCart('${set.day}')">Добавить в корзину</button>
<button onclick="openMenu(currentType)">← Назад</button>

</div>
`

}

// --- ДОБАВИТЬ ---
function addToCart(day){

const soup = document.querySelector('input[name="soup"]:checked')?.value
const main = document.querySelector('input[name="main"]:checked')?.value

if(!soup || !main){
alert("Выберите суп и второе блюдо")
return
}

const breads = [...document.querySelectorAll('input[name="bread"]:checked')].map(i=>i.value)
const pies = [...document.querySelectorAll('input[name="pies"]:checked')].map(i=>i.value)
const comment = document.getElementById("comment").value

cart.push({day,soup,main,bread:breads,pies:pies,comment})

renderCart()
alert("Добавлено")

}

// --- КОРЗИНА ---
function renderCart(){

if(cart.length === 0){
cartDiv.innerHTML = ""
return
}

cartDiv.innerHTML = `
<div class="cart">
<b>Корзина: ${cart.length}</b>
<button onclick="checkout()">Оформить заказ</button>
</div>
`

}

// --- ОФОРМЛЕНИЕ ---
function checkout(){

tg.sendData(JSON.stringify({cart}))

setTimeout(()=>{
tg.close()
},500)

}

// --- СТАРТ ---
renderMenuTypes()

</script>

</body>
</html>
